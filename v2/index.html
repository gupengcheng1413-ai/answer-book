<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>答案之书 · 心灵驿站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-state="menu">
  <div class="fit">
    <div class="stage">

      <!-- ========== 共享环境层（S2 / S3 / S4 可见） ========== -->
      <div class="env" aria-hidden="true">
        <div class="env__gradient"></div>
        <img class="env__stars env__stars--a" src="../assets/bg-stars.png" alt="" />
        <img class="env__stars env__stars--b" src="../assets/bg-stars.png" alt="" />
        <img class="env__glow env__glow--1" src="../assets/ellipse-glow-1.svg" alt="" />
        <img class="env__glow env__glow--2" src="../assets/ellipse-glow-2.svg" alt="" />
      </div>

      <!-- ========== S1 入口菜单 ========== -->
      <section id="screen-menu" class="screen screen--menu">
        <button class="card card--primary" type="button" data-action="enter">
          <img class="card__bg" src="../assets/menu-card-primary.png" alt="答案之书" draggable="false" />
        </button>
        <div class="card card--ghost"></div>
        <div class="card card--ghost"></div>
        <div class="card card--ghost"></div>
      </section>

      <!-- ========== 跨态魔法书（question/loading/answer/depleted 共享） ========== -->
      <div class="bookx" aria-hidden="true">
        <!-- 书下方光晕，闭合时强、打开时弱 -->
        <div class="bookx__halo"></div>
        <!-- 闭合态厚度（spine = 左侧书脊；edge = 上下右三条页边白条），打开后 fade -->
        <div class="bookx__spine"></div>
        <div class="bookx__edge bookx__edge--top"></div>
        <div class="bookx__edge bookx__edge--bottom"></div>
        <div class="bookx__edge bookx__edge--right"></div>
        <!-- 打开后左半页底色（已读完区域），闭合态隐藏 -->
        <div class="bookx__back"></div>

        <!-- 左半页装饰：仅 answer/depleted 态显示，魔法符印 -->
        <div class="bookx__lpage" aria-hidden="true">
          <div class="bookx__lpage-center">
            <span class="bookx__lpage-ring"></span>
            <svg class="bookx__lpage-rune" viewBox="-50 -50 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <defs>
                <linearGradient id="runeGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"   stop-color="#d4a65a" />
                  <stop offset="70%"  stop-color="#8b5a1f" />
                  <stop offset="100%" stop-color="#d4a65a" />
                </linearGradient>
              </defs>
              <!-- ⟡ 风格的四角凹边星，所有路径都围绕 (0,0) 对称：几何中心 = 视觉中心 -->
              <path d="M 0,-26 C 4,-9 9,-4 26,0 C 9,4 4,9 0,26 C -4,9 -9,4 -26,0 C -9,-4 -4,-9 0,-26 Z"
                    fill="url(#runeGrad)" />
            </svg>
          </div>
          <span class="bookx__lpage-star bookx__lpage-star--tl">✦</span>
          <span class="bookx__lpage-star bookx__lpage-star--tr">✦</span>
          <span class="bookx__lpage-star bookx__lpage-star--bl">✦</span>
          <span class="bookx__lpage-star bookx__lpage-star--br">✦</span>
        </div>

        <!-- 5 张可翻页：page-1 在最上（合着时即封面），翻完后停在 -180° -->
        <div class="bookx__page bookx__page--5">
          <div class="bookx__face bookx__face--front"></div>
          <div class="bookx__face bookx__face--back"></div>
        </div>
        <div class="bookx__page bookx__page--4">
          <div class="bookx__face bookx__face--front"></div>
          <div class="bookx__face bookx__face--back"></div>
        </div>
        <div class="bookx__page bookx__page--3">
          <div class="bookx__face bookx__face--front"></div>
          <div class="bookx__face bookx__face--back"></div>
        </div>
        <div class="bookx__page bookx__page--2">
          <div class="bookx__face bookx__face--front"></div>
          <div class="bookx__face bookx__face--back"></div>
        </div>
        <div class="bookx__page bookx__page--1">
          <div class="bookx__face bookx__face--front bookx__face--cover">
            <span class="bookx__corner bookx__corner--tl" aria-hidden="true"></span>
            <span class="bookx__corner bookx__corner--tr" aria-hidden="true"></span>
            <span class="bookx__corner bookx__corner--bl" aria-hidden="true"></span>
            <span class="bookx__corner bookx__corner--br" aria-hidden="true"></span>
            <span class="bookx__sigil bookx__sigil--t" aria-hidden="true">✧ ✦ ✧</span>
            <span class="bookx__title">答案之书</span>
            <span class="bookx__sigil bookx__sigil--b" aria-hidden="true">✧ ✦ ✧</span>
            <span class="bookx__rune" aria-hidden="true">⟡</span>
            <span class="bookx__shine" aria-hidden="true"></span>
          </div>
          <div class="bookx__face bookx__face--back"></div>
        </div>

        <!-- 环绕火星粒子（魔法感）-->
        <span class="bookx__spark bookx__spark--1" aria-hidden="true"></span>
        <span class="bookx__spark bookx__spark--2" aria-hidden="true"></span>
        <span class="bookx__spark bookx__spark--3" aria-hidden="true"></span>
        <span class="bookx__spark bookx__spark--4" aria-hidden="true"></span>
        <span class="bookx__spark bookx__spark--5" aria-hidden="true"></span>
        <span class="bookx__spark bookx__spark--6" aria-hidden="true"></span>

        <!-- 答案区：独立于 page，落在书的右半页；翻完后显示 -->
        <div class="bookx__answer">
          <h2 class="answer__title" id="answerTitle">不要犹豫</h2>
          <p class="answer__sub" id="answerSub">Do not worry</p>
          <p class="answer__depleted">今天的魔法已经用完啦<br />明天再来和宇宙对话吧</p>
        </div>
      </div>

      <!-- ========== S2 提问页（仅右侧按钮） ========== -->
      <section id="screen-question" class="screen screen--question" aria-hidden="true">
        <div class="prompt">
          <p class="prompt__text">心中默念你的问题</p>
          <button class="cta" type="button" data-action="find-answer">
            <span class="cta__halo" aria-hidden="true"></span>
            <span class="cta__star cta__star--l" aria-hidden="true"></span>
            <span class="cta__star cta__star--r" aria-hidden="true"></span>
            <span class="cta__label">寻找答案</span>
          </button>
        </div>
      </section>

      <!-- ========== S3 答案 / S4 次数耗尽（仅右侧按钮 + 关闭） ========== -->
      <section id="screen-answer" class="screen screen--answer" aria-hidden="true">
        <div class="prompt prompt--answer">
          <button class="cta cta--again" type="button" data-action="ask-again">
            <span class="cta__halo" aria-hidden="true"></span>
            <span class="cta__star cta__star--l" aria-hidden="true"></span>
            <span class="cta__star cta__star--r" aria-hidden="true"></span>
            <span class="cta__label" id="ctaLabel">再问一次</span>
          </button>
        </div>

        <button class="close" type="button" data-action="close" aria-label="关闭">
          <img src="../assets/close-x.png" alt="" />
        </button>
      </section>

      <!-- 调试提示 -->
      <p class="debug-hint" aria-hidden="true">
        <span>键盘 1/2/3/4 切换状态 · R 重置 · 5 卡 loading</span>
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
